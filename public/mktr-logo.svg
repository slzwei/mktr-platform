<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80" role="img" aria-label="MKTR">
  <!-- Terminal wordmark — light variant (cream body) for dark backgrounds. -->
  <text x="14" y="55"
        font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace"
        font-size="44"
        font-weight="600"
        letter-spacing="-0.5"
        fill="#D9542A">&#8250;</text>
  <text x="40" y="55"
        font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace"
        font-size="44"
        font-weight="500"
        letter-spacing="-0.5"
        fill="#F5F0E6">mktr</text>
  <!-- Cursor bar: 0.5em x 0.12em (22px x 5.3px at 44px font-size). -->
  <rect x="143" y="51" width="22" height="5.3" fill="#F5F0E6"/>
</svg>
