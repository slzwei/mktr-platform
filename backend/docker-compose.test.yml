# Lightweight Postgres for running the test suite locally.
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   JWT_SECRET=localtest npm test
#   docker compose -f docker-compose.test.yml down
version: '3.8'
services:
  postgres-test:
    image: postgres:15-alpine
    container_name: mktr-postgres-test
    environment:
      POSTGRES_DB: mktr_test
      POSTGRES_USER: mktr_local
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mktr_local -d mktr_test"]
      interval: 3s
      timeout: 3s
      retries: 10
